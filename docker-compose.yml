# =============================================================================
# Trading Bot - Docker Compose
# =============================================================================
# Services: API, Dashboard, Bot (trading engine)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # FastAPI Backend (Port 8000)
  # ---------------------------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    container_name: trading-bot-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks:
      - trading-network

  # ---------------------------------------------------------------------------
  # Streamlit Dashboard (Port 8501)
  # ---------------------------------------------------------------------------
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      target: dashboard
    container_name: trading-bot-dashboard
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src
      - API_URL=http://api:8000
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped
    networks:
      - trading-network

  # ---------------------------------------------------------------------------
  # Trading Bot Engine (Optional - start manually)
  # ---------------------------------------------------------------------------
  bot:
    build:
      context: .
      dockerfile: Dockerfile
      target: bot
    container_name: trading-bot-engine
    env_file:
      - .env
    environment:
      - PYTHONPATH=/app/src
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TRADING_MODE=${TRADING_MODE:-paper}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    profiles:
      - bot  # Only starts with: docker-compose --profile bot up
    restart: unless-stopped
    networks:
      - trading-network

networks:
  trading-network:
    driver: bridge
